# =============================================================================
# Thirty — pnpm 11 Workspace Config
# =============================================================================
# pnpm 11 : la config projet vit ici (plus dans .npmrc)
# Ref: https://pnpm.io/11.x/pnpm-workspace-yaml
# =============================================================================

packages:
  - "apps/*"
  - "packages/*"

injectWorkspacePackages: true
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
